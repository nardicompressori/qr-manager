<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0b0b0b;--s:#141414;--s2:#1e1e1e;--b:#2a2a2a;--b2:#444;--t:#f0f0f0;--m:#666;--a:#e02020;--g:#00c850;--r:4px}
  body{background:var(--bg);color:var(--t);font-family:'JetBrains Mono',monospace;min-height:100vh;font-size:13px}
  #redirect-screen{display:none;position:fixed;inset:0;background:#fff;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:sans-serif;color:#333}
  #redirect-screen img{width:60px;opacity:.6}
  .header{background:var(--s);border-bottom:1px solid var(--b);padding:0 20px;display:flex;align-items:center;gap:14px;height:56px}
  .hlogo{width:32px;height:32px;filter:invert(1)}
  .htitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
  .hdot{margin-left:auto;width:8px;height:8px;border-radius:50%;cursor:pointer;flex-shrink:0}
  .hdot.ok{background:var(--g);box-shadow:0 0 6px var(--g)}
  .hdot.err{background:var(--a);box-shadow:0 0 6px var(--a)}
  .app{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 56px)}
  .sidebar{background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column}
  .form{padding:16px;border-bottom:1px solid var(--b);display:flex;flex-direction:column;gap:10px}
  .lbl{font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  input{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;border-radius:var(--r);outline:none;transition:border-color .15s}
  input:focus{border-color:var(--a)}
  .btn-create{background:var(--a);color:#fff;border:none;border-radius:var(--r);padding:10px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;width:100%}
  .btn-create:hover{filter:brightness(1.1)}
  .btn-create:disabled{opacity:.4;cursor:not-allowed}
  .list-hdr{padding:10px 16px;font-size:10px;color:var(--m);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--b)}
  .clist{flex:1;overflow-y:auto}
  .empty{padding:40px 16px;text-align:center;color:var(--m);font-size:11px;line-height:2.2}
  .ci{padding:12px 16px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .12s}
  .ci:hover{background:var(--s2)}
  .ci.active{background:rgba(224,32,32,.07);border-left:3px solid var(--a)}
  .ci-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:3px}
  .ci-short{font-size:10px;color:var(--g);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ci-url{font-size:10px;color:var(--m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .main{padding:32px;display:flex;flex-direction:column;gap:24px;overflow-y:auto}
  .main-empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:10px;color:var(--m)}
  .main-empty .ico{font-size:40px;opacity:.2}
  .qr-row{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:start}
  .qr-wrap{background:#fff;padding:16px;border-radius:var(--r);display:inline-block;box-shadow:0 0 0 1px var(--b),0 16px 32px rgba(0,0,0,.5)}
  .meta{display:flex;flex-direction:column;gap:14px}
  .ctitle{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1}
  .badge-ok{display:inline-block;padding:3px 9px;font-size:10px;border-radius:2px;background:rgba(0,200,80,.12);color:var(--g);border:1px solid rgba(0,200,80,.25)}
  .block{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px}
  .block-row{display:flex;gap:8px;align-items:center;margin-top:6px}
  .block-row input{flex:1;color:var(--a)}
  .btn-save{background:var(--a);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;white-space:nowrap}
  .btn-save:hover{filter:brightness(1.1)}
  .btn-save:disabled{opacity:.4;cursor:not-allowed}
  .short-note{font-size:10px;color:var(--g);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn-dl{background:var(--a);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;cursor:pointer}
  .btn-dl:hover{filter:brightness(1.1)}
  .btn-ghost{background:transparent;color:var(--m);border:1px solid var(--b);border-radius:var(--r);padding:9px 14px;font-family:'Bebas Neue',sans-serif;font-size:14px;cursor:pointer}
  .btn-ghost:hover{color:var(--t);border-color:var(--b2)}
  .btn-del{background:transparent;color:#ff3b3b;border:1px solid rgba(255,59,59,.25);border-radius:var(--r);padding:9px 14px;font-family:'Bebas Neue',sans-serif;font-size:14px;cursor:pointer;margin-left:auto}
  .btn-del:hover{background:rgba(255,59,59,.08)}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:28px;width:460px;max-width:95vw;display:flex;flex-direction:column;gap:14px}
  .modal h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
  .note{font-size:11px;color:var(--m);line-height:1.9;background:var(--s2);padding:12px;border-radius:var(--r);border-left:2px solid var(--a)}
  .note a{color:var(--a);text-decoration:none}.note a:hover{text-decoration:underline}
  .note code{background:rgba(224,32,32,.1);padding:1px 4px;border-radius:2px;color:var(--a)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .btn-cancel{background:transparent;color:var(--m);border:1px solid var(--b);border-radius:var(--r);padding:7px 14px;font-family:'Bebas Neue',sans-serif;font-size:13px;cursor:pointer}
  .btn-ok{background:var(--a);color:#fff;border:none;border-radius:var(--r);padding:7px 16px;font-family:'Bebas Neue',sans-serif;font-size:13px;cursor:pointer}
  .setup{max-width:500px;margin:32px auto;background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:28px;display:flex;flex-direction:column;gap:14px}
  .setup h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
  .step{background:var(--s2);border-radius:var(--r);padding:11px 14px;font-size:12px;line-height:1.9}
  .step a{color:var(--a);text-decoration:none}.step a:hover{text-decoration:underline}
  .step code{background:rgba(224,32,32,.1);padding:1px 4px;border-radius:2px;color:var(--a)}
  .sn{font-family:'Bebas Neue',sans-serif;color:var(--a);font-size:15px;margin-right:5px}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--s);border:1px solid var(--b2);color:var(--t);padding:10px 16px;border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:12px;z-index:99;transform:translateY(60px);opacity:0;transition:all .2s;pointer-events:none;max-width:340px}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.ok{border-color:var(--g);color:var(--g)}
  .toast.err{border-color:var(--a);color:var(--a)}
  @media(max-width:700px){.app{grid-template-columns:1fr}.sidebar{max-height:45vh}.qr-row{grid-template-columns:1fr}.main{padding:16px}}
</style>

<!-- Redirect screen (shown when ?go=ID is in URL) -->
<div id="redirect-screen">
  <img id="rlogo" alt="">
  <div id="redirect-msg" style="font-size:14px;color:#555">Loading…</div>
</div>

<div id="manager-ui">
  <div class="header">
    <img class="hlogo" id="hlogo" alt="">
    <span class="htitle">QR MANAGER</span>
    <div class="hdot" id="hdot" title="Hold 3s for admin"
      onmousedown="holdStart()" onmouseup="holdStop()" onmouseleave="holdStop()"
      ontouchstart="holdStart(event)" ontouchend="holdStop()"></div>
  </div>
  <div id="root"></div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="modal">
    <h2>⚙ ADMIN — FIREBASE</h2>
    <div class="note">
      1. <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → New project<br>
      2. Realtime Database → Create → <code>Test mode</code><br>
      3. Copy the URL: <code>https://xxx-rtdb.firebaseio.com</code>
    </div>
    <div>
      <div class="lbl">Firebase Database URL</div>
      <input type="text" id="fb-input" placeholder="https://xxx-default-rtdb.firebaseio.com">
    </div>
    <div id="fb-test-result" style="font-size:11px;min-height:16px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdmin()">Cancel</button>
      <button class="btn-ghost" style="padding:7px 12px;font-size:13px" onclick="testFirebase()">Test</button>
      <button class="btn-ghost" style="padding:7px 12px;font-size:13px;color:var(--g);border-color:rgba(0,200,80,.3)" onclick="generateDeploy()">⬇ Generate for GitHub</button>
      <button class="btn-ok" onclick="saveAdmin()">Save (local)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="qrh" style="position:absolute;left:-9999px;top:-9999px"></div>

// ── Redirect mode: if ?go=ID → fetch from Firebase and redirect ───────────
// FIREBASE_URL is embedded at deploy time (see admin → Generate & Deploy)
const EMBEDDED_FB_URL='__FIREBASE_URL__';

(async()=>{
  const go=new URLSearchParams(location.search).get('go');
  if(!go)return; // manager mode
  document.getElementById('manager-ui').style.display='none';
  document.getElementById('redirect-screen').style.display='flex';
  // Use embedded URL (deployed version) or fallback to localStorage (dev mode)
  const fb=EMBEDDED_FB_URL!=='__FIREBASE_URL__'
    ? EMBEDDED_FB_URL
    : localStorage.getItem('ng_fb_url');
  if(!fb){document.getElementById('redirect-msg').textContent='Not configured';return}
  try{
    const r=await fetch(fb.replace(/\/$/,'')+'/c/'+go+'.json');
    const url=await r.json();
    if(url){
      document.getElementById('redirect-msg').textContent='Redirecting…';
      location.replace(url);
    }else{
      document.getElementById('redirect-msg').textContent='Link not found';
    }
  }catch(e){
    document.getElementById('redirect-msg').textContent='Error: '+e.message;
  }
})();

// ── Logo flood-fill ───────────────────────────────────────────────────────
let logoCanvas=null;
(()=>{
  const img=new Image();
  img.onload=()=>{
    const sz=500,c=document.createElement('canvas');
    c.width=c.height=sz;const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,sz,sz);
    const d=ctx.getImageData(0,0,sz,sz),px=d.data;
    const dark=i=>px[i]<60&&px[i+1]<60&&px[i+2]<60;
    const vis=new Uint8Array(sz*sz),q=[];
    const eq=i=>{if(!vis[i]){vis[i]=1;q.push(i)}};
    for(let x=0;x<sz;x++){eq(x);eq((sz-1)*sz+x)}
    for(let y=0;y<sz;y++){eq(y*sz);eq(y*sz+sz-1)}
    let h=0;
    while(h<q.length){
      const i=q[h++],x=i%sz,y=i/sz|0;
      for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){
        const nx=x+dx,ny=y+dy;
        if(nx<0||nx>=sz||ny<0||ny>=sz)continue;
        const ni=ny*sz+nx;
        if(!vis[ni]&&dark(ni*4))eq(ni);
      }
    }
    for(let i=0;i<sz*sz;i++)if(vis[i])px[i*4+3]=0;
    ctx.putImageData(d,0,0);logoCanvas=c;
    if(active)renderQR(active);
  };img.src=LOGO;
})();

// ── State ─────────────────────────────────────────────────────────────────
const SK='ng_qr_v9',FK='ng_fb_url';
let campaigns=(()=>{try{return JSON.parse(localStorage.getItem(SK)||'[]')}catch{return[]}})();
let active=null;
let fbUrl=localStorage.getItem(FK)||'';
const saveC=()=>localStorage.setItem(SK,JSON.stringify(campaigns));

// QR base URL = current page URL without query params
const BASE_URL=location.href.split('?')[0].replace(/\/$/,'');

// ── Firebase ──────────────────────────────────────────────────────────────
async function fbWrite(id,url){
  const r=await fetch(fbUrl.replace(/\/$/,'')+'/c/'+id+'.json',{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(url)
  });
  if(!r.ok)throw new Error('Firebase error '+r.status+' — check database URL and Test mode rules');
}

// ── Admin ─────────────────────────────────────────────────────────────────
let holdTimer=null;
function holdStart(e){if(e&&e.preventDefault)e.preventDefault();holdTimer=setTimeout(openAdmin,3000)}
function holdStop(){clearTimeout(holdTimer);holdTimer=null}
function updateDot(){document.getElementById('hdot').className='hdot '+(fbUrl?'ok':'err')}
updateDot();
function openAdmin(){
  document.getElementById('fb-input').value=fbUrl;
  document.getElementById('fb-test-result').textContent='';
  document.getElementById('admin-overlay').classList.add('open');
}
async function generateDeploy(){
  const url=document.getElementById('fb-input').value.trim().replace(/\/$/,'');
  if(!url){toast('Enter Firebase URL first','err');return}
  try{
    // Fetch raw source of THIS file (keeps __FIREBASE_URL__ placeholder intact)
    const resp=await fetch(location.href);
    const src=await resp.text();
    if(!src.includes('__FIREBASE_URL__')){
      toast('Cannot find placeholder — re-download the original file from Claude','err');
      return;
    }
    const deployed=src.replace("'__FIREBASE_URL__'","'"+url+"'");
    const blob=new Blob([deployed],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='index.html';
    a.click();
    toast('index.html downloaded — upload it to GitHub to replace the old one','ok');
  }catch(e){
    toast('Error: '+e.message,'err');
  }
}
function closeAdmin(){document.getElementById('admin-overlay').classList.remove('open')}
function saveAdmin(){
  fbUrl=document.getElementById('fb-input').value.trim().replace(/\/$/,'');
  localStorage.setItem(FK,fbUrl);
  updateDot();closeAdmin();render();
  toast('Firebase URL saved','ok');
}
async function testFirebase(){
  const url=document.getElementById('fb-input').value.trim().replace(/\/$/,'');
  const el=document.getElementById('fb-test-result');
  el.style.color='var(--y)';el.textContent='Testing…';
  try{
    const r=await fetch(url+'/ping.json',{method:'PUT',
      headers:{'Content-Type':'application/json'},body:'"ok"'});
    if(r.ok){el.style.color='var(--g)';el.textContent='✓ Firebase connected!'}
    else{el.style.color='var(--a)';el.textContent='Error '+r.status+' — check URL and Test mode rules'}
  }catch(e){
    el.style.color='var(--a)';el.textContent='Failed: '+e.message;
  }
}
document.getElementById('admin-overlay').addEventListener('click',e=>{if(e.target.id==='admin-overlay')closeAdmin()});

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  if(!fbUrl){
    document.getElementById('root').innerHTML=`
    <div class="main"><div class="setup">
      <h2>SETUP REQUIRED</h2>
      <p style="font-size:12px;color:var(--m);line-height:1.8">
        Needs a free <strong style="color:var(--t)">Firebase Realtime Database</strong> to store URL mappings.
        Once configured, updating any QR destination is instant and the printed QR never changes.
      </p>
      <div class="step"><span class="sn">1</span>
        Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a>
        → <strong style="color:var(--t)">Add project</strong> (use your Google account)
      </div>
      <div class="step"><span class="sn">2</span>
        In the project: <strong style="color:var(--t)">Realtime Database</strong> → Create database
        → choose any region → <strong style="color:var(--t)">Start in test mode</strong> → Done
      </div>
      <div class="step"><span class="sn">3</span>
        Copy the database URL shown (e.g. <code>https://my-project-rtdb.firebaseio.com</code>)
        → hold the dot top-right 3 seconds → paste → Test → Save
      </div>
      <button class="btn-create" onclick="openAdmin()">⚙ CONFIGURE FIREBASE</button>
    </div></div>`;
    return;
  }
  document.getElementById('root').innerHTML=`
    <div class="app">
      <div class="sidebar">
        <div class="form">
          <div><div class="lbl">Campaign name</div>
            <input id="nn" placeholder="E.g.: Atlantic Brochure"
              onkeydown="if(event.key==='Enter')document.getElementById('nu').focus()">
          </div>
          <div><div class="lbl">URL</div>
            <input id="nu" placeholder="https://..."
              onkeydown="if(event.key==='Enter')create()">
          </div>
          <button class="btn-create" id="btnc" onclick="create()">▶ CREATE QR CODE</button>
        </div>
        <div class="list-hdr">CAMPAIGNS (<span id="cnt">0</span>)</div>
        <div class="clist" id="clist"></div>
      </div>
      <div class="main" id="main">
        <div class="main-empty"><div class="ico">◈</div><div>Select or create a campaign</div></div>
      </div>
    </div>`;
  renderList();
  if(active){const a=campaigns.find(c=>c.id===active.id);if(a){active=a;renderMain()}}
}

// ── Campaign ──────────────────────────────────────────────────────────────
function idGen(){return Math.random().toString(36).substring(2,9)}

async function create(){
  const name=document.getElementById('nn').value.trim();
  const url=document.getElementById('nu').value.trim();
  if(!name||!url){toast('Enter name and URL','err');return}
  const btn=document.getElementById('btnc');
  btn.disabled=true;btn.textContent='SAVING…';
  try{
    const id=idGen();
    await fbWrite(id,url);
    const qrUrl=BASE_URL+'?go='+id;
    const c={id:Date.now().toString(36),name,fbId:id,url,qrUrl,
             createdAt:new Date().toISOString()};
    campaigns.unshift(c);saveC();
    document.getElementById('nn').value='';
    document.getElementById('nu').value='';
    renderList();select(c.id);
    toast('Campaign created ✓','ok');
  }catch(e){
    toast('Error: '+e.message,'err');
  }finally{
    btn.disabled=false;btn.textContent='▶ CREATE QR CODE';
  }
}

function renderList(){
  const el=document.getElementById('clist');if(!el)return;
  document.getElementById('cnt').textContent=campaigns.length;
  if(!campaigns.length){el.innerHTML='<div class="empty">No campaigns yet.</div>';return}
  el.innerHTML=campaigns.map(c=>`
    <div class="ci ${active&&active.id===c.id?'active':''}" onclick="select('${c.id}')">
      <div class="ci-name">${c.name}</div>
      <div class="ci-short">${c.qrUrl||''}</div>
      <div class="ci-url">${c.url}</div>
    </div>`).join('');
}
function select(id){active=campaigns.find(c=>c.id===id);if(!active)return;renderList();renderMain()}

function renderMain(){
  const c=active;
  document.getElementById('main').innerHTML=`
    <div class="qr-row">
      <div>
        <div class="qr-wrap"><canvas id="qrc"></canvas></div>
        <div class="actions" style="margin-top:12px">
          <button class="btn-dl" onclick="dl()">⬇ DOWNLOAD PNG</button>
          <button class="btn-ghost" onclick="window.open(active.qrUrl,'_blank')">↗ TEST</button>
          <button class="btn-del" onclick="del()">✕</button>
        </div>
      </div>
      <div class="meta">
        <div class="ctitle">${c.name}</div>
        <span class="badge-ok">● QR PERMANENT</span>
        <div class="block">
          <div class="lbl">Destination URL</div>
          <div class="block-row">
            <input id="uf" value="${c.url.replace(/"/g,'&quot;')}"
              onkeydown="if(event.key==='Enter')upd()">
            <button class="btn-save" id="btns" onclick="upd()">SAVE</button>
          </div>
          <div class="short-note">→ ${c.qrUrl}</div>
        </div>
        <div style="font-size:11px;color:var(--m)">Created ${new Date(c.createdAt).toLocaleDateString('en-GB')}</div>
      </div>
    </div>`;
  renderQR(c);
}

async function upd(){
  const v=document.getElementById('uf').value.trim();
  if(!v){toast('Invalid URL','err');return}
  if(v===active.url){toast('URL unchanged');return}
  const btn=document.getElementById('btns');btn.disabled=true;btn.textContent='…';
  try{
    await fbWrite(active.fbId,v);
    active.url=v;saveC();renderList();renderMain();
    toast('Updated — QR unchanged ✓','ok');
  }catch(e){
    toast('Error: '+e.message,'err');
    btn.disabled=false;btn.textContent='SAVE';
  }
}

function renderQR(c){
  const SIZE=320;
  document.getElementById('qrh').innerHTML='';
  new QRCode(document.getElementById('qrh'),{
    text:c.qrUrl,width:SIZE,height:SIZE,
    colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const src=document.getElementById('qrh').querySelector('canvas')
              ||document.getElementById('qrh').querySelector('img');
    const cv=document.getElementById('qrc');
    if(!cv||!src)return;
    cv.width=cv.height=SIZE;
    const ctx=cv.getContext('2d');
    const draw=()=>{
      ctx.clearRect(0,0,SIZE,SIZE);ctx.drawImage(src,0,0,SIZE,SIZE);
      if(!logoCanvas)return;
      const lw=SIZE*.55,lx=(SIZE-lw)/2,ly=(SIZE-lw)/2;
      ctx.drawImage(logoCanvas,lx,ly,lw,lw);
    };
    src.tagName==='CANVAS'?draw():(src.onload=draw,src.complete&&draw());
  },120);
}

function dl(){
  const cv=document.getElementById('qrc');if(!cv)return;
  const a=document.createElement('a');
  a.download='QR_'+active.name.replace(/\s+/g,'_')+'.png';
  a.href=cv.toDataURL('image/png');a.click();
  toast('Downloaded!','ok');
}
function del(){
  if(!confirm('Delete this campaign?'))return;
  campaigns=campaigns.filter(c=>c.id!==active.id);saveC();active=null;
  document.getElementById('main').innerHTML='<div class="main-empty"><div class="ico">◈</div><div>Select or create a campaign</div></div>';
  renderList();
}
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type||'');
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000);
}

render();
</script>
