<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:10px;font-family:sans-serif;color:#999;font-size:13px}</style>
</head><body>
<div id="m">Loading…</div>
<script>
var FB='https://qr-manager-235cf-default-rtdb.europe-west1.firebasedatabase.app';
var id=new URLSearchParams(location.search).get('go');
if(!id){document.getElementById('m').textContent='Missing ID';} else {
  fetch(FB+'/c/'+id+'.json')
    .then(function(r){return r.json()})
    .then(function(u){
      if(u){location.replace(u);}
      else{document.getElementById('m').textContent='Link not found';}
    })
    .catch(function(e){document.getElementById('m').textContent='Error: '+e.message;});
}
</script>
</body></html>
